services:
  app:
    build: .
    container_name: codeevo-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://userdb:5432/userdb
      SPRING_DATASOURCE_USERNAME: codeevo
      SPRING_DATASOURCE_PASSWORD: codeevo_pass
      JWT_SECRET: "c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1jb2RlZXZvLW1vbm9saXRoLWFwcC0yMDI0"
    depends_on:
      userdb:
        condition: service_healthy
    restart: unless-stopped

  userdb:
    image: postgres:15-alpine
    container_name: codeevo-userdb
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: codeevo
      POSTGRES_PASSWORD: codeevo_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeevo -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - userdb_data:/var/lib/postgresql/data

volumes:
  userdb_data:
